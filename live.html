<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="theme-color" content="#5B2D8E">
    <title>Hatfield NC U13s - Live Score</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700;900&family=Inter:wght@400;500;600;700;800;900&family=Lexend:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet">
    <link rel="icon" href="icons/icon.svg" type="image/svg+xml">
    <link rel="stylesheet" href="css/live-kinetic.css">
    <style>/* overrides only */</style>
</head>
<body>

<nav class="page-nav">
    <a href="index.html" class="nav-back">&larr; Home</a>
    <span class="nav-title">Live</span>
</nav>

<div id="no-match" class="no-match">
    <img src="icons/hatfield.jpg" alt="Hatfield NC" class="no-match-logo">
    <h2>Hatfield NC U13s</h2>
    <p class="waiting-dots">Waiting for a match to start</p>
</div>

<div id="match-view" style="display:none">
    <!-- Hero Scoreboard -->
    <div class="hero">
        <img src="icons/hatfield.jpg" alt="Hatfield NC" class="hero-logo">
        <div class="live-badge"><span class="dot"></span> Live</div>
        <div class="statistician-name" id="lv-statistician"></div>
        <div class="teams-row">
            <span class="team-name" id="lv-home-name">Home</span>
            <span class="vs">vs</span>
            <span class="team-name" id="lv-away-name">Away</span>
        </div>
        <div class="score-row">
            <span class="score-big" id="lv-home-score">0</span>
            <span class="score-divider">:</span>
            <span class="score-big" id="lv-away-score">0</span>
        </div>
        <div class="quarter-timer">
            <span class="quarter-badge" id="lv-quarter">Q1</span>
            <span class="timer-display" id="lv-timer"></span>
            <span class="shooting-pct" id="lv-shooting"></span>
        </div>
    </div>

    <!-- Quarter Scores + Possession Stats -->
    <div class="quarter-strip" id="lv-quarters"></div>
    <div class="possession-strip" id="lv-possession"></div>

    <!-- Last Event -->
    <div class="last-event-banner" id="lv-last-event">Match in progress</div>

    <!-- Tabs -->
    <div class="tabs">
        <button class="tab active" onclick="switchTab('feed')">Live Feed</button>
        <button class="tab" onclick="switchTab('stats')">Stats</button>
        <button class="tab" onclick="switchTab('lineup')">Lineup</button>
    </div>

    <!-- Feed Tab -->
    <div id="tab-feed" class="tab-content active">
        <div class="feed-list" id="lv-feed"></div>
    </div>

    <!-- Stats Tab -->
    <div id="tab-stats" class="tab-content">
        <div class="stats-grid" id="lv-stats"></div>
    </div>

    <!-- Lineup Tab -->
    <div id="tab-lineup" class="tab-content">
        <div class="lineup-court" id="lv-lineup"></div>
    </div>
</div>

<!-- Previous Results -->
<div id="results-section" class="results-section">
    <div class="results-header">Previous Results</div>
    <div id="results-list" class="results-list"></div>
</div>

<!-- Match Detail Overlay -->
<div id="match-detail" class="detail-overlay" style="display:none">
    <div class="detail-panel">
        <div class="detail-header">
            <button class="detail-back" onclick="closeDetail()">&larr; Back</button>
        </div>
        <div id="detail-content"></div>
    </div>
</div>

<div style="text-align:center;padding:1rem">
    <a href="dashboard.html" style="display:inline-flex;align-items:center;gap:0.4rem;padding:0.65rem 1.2rem;background:var(--primary);color:#fff;border-radius:10px;font-size:0.85rem;font-weight:700;text-decoration:none;box-shadow:0 2px 12px rgba(91,45,142,0.3)">
        &#128200; Season Dashboard
    </a>
</div>

<div class="branding">
    <img src="icons/hatfield.jpg" alt="" style="width:24px;border-radius:5px;background:#fff;padding:1px;vertical-align:middle;margin-right:0.2rem">
    Hatfield Netball Club - U13s Purple
</div>

<script type="module">
    import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js';
    import { getFirestore, doc, onSnapshot, collection, getDocs }
        from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js';

    const app = initializeApp({
        apiKey: "AIzaSyCCCj33LlcJ1yB0SxI6mH8jBm0AT2YB9hQ",
        authDomain: "netballstats-6a872.firebaseapp.com",
        projectId: "netballstats-6a872",
        storageBucket: "netballstats-6a872.firebasestorage.app",
        messagingSenderId: "340532434363",
        appId: "1:340532434363:web:763de79b6ca1bd8f04209e"
    });
    const db = getFirestore(app);

    const noMatch = document.getElementById('no-match');
    const matchView = document.getElementById('match-view');
    let prevScore = null;
    let prevLastEvent = null;

    const tabNames = ['feed', 'stats', 'lineup'];
    window.switchTab = function(tab) {
        document.querySelectorAll('.tab').forEach((t, i) => {
            t.classList.toggle('active', tabNames[i] === tab);
        });
        tabNames.forEach(t => {
            document.getElementById('tab-' + t).classList.toggle('active', t === tab);
        });
    };

    function getEventDisplay(e) {
        const icons = {
            goal: '&#9917;', miss: '&#10060;', opp_goal: '&#9917;',
            intercept: '&#128170;', deflection: '&#128170;', rebound: '&#8593;',
            turnover: '&#8635;', centre_pass: '&#9654;', feed: '&#10145;',
            assist: '&#127942;', pickup: '&#9995;', system: '&#8505;',
            penalty_contact: '&#9888;', penalty_obstruction: '&#128683;'
        };
        const classes = {
            goal: 'goal', miss: 'turnover', opp_goal: 'opp',
            intercept: 'defence', deflection: 'defence', rebound: 'defence',
            turnover: 'turnover', system: 'system'
        };
        return {
            icon: icons[e.action] || '&#9654;',
            css: classes[e.action] || '',
            text: e.action === 'system' ? e.playerName
                : e.action === 'opp_goal' ? `<strong>${e.playerName}</strong> scored`
                : `<strong>${e.playerName}</strong> ${e.action.replace(/_/g, ' ')}${e.position ? ' (' + e.position + ')' : ''}`
        };
    }

    onSnapshot(doc(db, 'live', 'current'), (snap) => {
        const d = snap.data();
        if (!d || d.status === 'none') {
            noMatch.style.display = '';
            matchView.style.display = 'none';
            return;
        }

        noMatch.style.display = 'none';
        matchView.style.display = '';

        // Scoreboard
        document.getElementById('lv-home-name').textContent = d.homeTeam || '';
        document.getElementById('lv-statistician').textContent =
            d.statistician ? `Stats by ${d.statistician}` : '';
        document.getElementById('lv-away-name').textContent = d.awayTeam || '';
        document.getElementById('lv-home-score').textContent = d.homeScore || 0;
        document.getElementById('lv-away-score').textContent = d.awayScore || 0;
        document.getElementById('lv-quarter').textContent = `Q${d.quarter || 1}`;

        // Timer
        if (d.timerSeconds !== undefined && d.quarterLength) {
            const mins = Math.floor(d.timerSeconds / 60);
            const secs = d.timerSeconds % 60;
            document.getElementById('lv-timer').textContent = `${mins}:${String(secs).padStart(2, '0')}`;
        }

        // Shooting %
        let totalGoals = 0, totalMisses = 0;
        if (d.playerStats) {
            Object.values(d.playerStats).forEach(s => {
                totalGoals += s.goal || 0;
                totalMisses += s.miss || 0;
            });
            const attempts = totalGoals + totalMisses;
            const pct = attempts > 0 ? Math.round((totalGoals / attempts) * 100) : 0;
            document.getElementById('lv-shooting').textContent =
                attempts > 0 ? `Shooting ${totalGoals}/${attempts} (${pct}%)` : '';
        }

        // Possession stats
        const possEl = document.getElementById('lv-possession');
        const cpg = d.cpToGoal || 0;
        const tog = d.toToGoal || 0;
        possEl.innerHTML = cpg || tog ?
            `<span>CP→Goal: <span class="poss-val">${cpg}</span></span>
             <span>TO→Goal: <span class="poss-val">${tog}</span></span>` : '';

        // Quarter scores
        if (d.quarterScores) {
            document.getElementById('lv-quarters').innerHTML = d.quarterScores
                .map((qs, i) => `<div class="qs-card">
                    <div class="qs-label">Q${i + 1}</div>
                    <div class="qs-score">${qs.home} - ${qs.away}</div>
                </div>`).join('');
        }

        // Last event with flash
        const banner = document.getElementById('lv-last-event');
        const newEvent = d.lastEvent || 'Match in progress';
        if (prevLastEvent !== null && prevLastEvent !== newEvent) {
            banner.classList.remove('goal-flash', 'opp-flash');
            void banner.offsetWidth;
            if (newEvent.toLowerCase().includes('goal') || newEvent.toLowerCase().includes('scored')) {
                banner.classList.add(newEvent.includes(d.awayTeam) ? 'opp-flash' : 'goal-flash');
            }
        }
        banner.textContent = newEvent;
        prevLastEvent = newEvent;

        // Live feed
        if (d.events && d.events.length) {
            const feedEl = document.getElementById('lv-feed');
            feedEl.innerHTML = [...d.events].reverse().map(e => {
                const ev = getEventDisplay(e);
                return `<div class="feed-item ${ev.css}">
                    <span class="feed-time">Q${e.quarter}</span>
                    <span class="feed-icon">${ev.icon}</span>
                    <span class="feed-text">${ev.text}</span>
                    <span class="feed-time">${e.time || ''}</span>
                </div>`;
            }).join('');
        }

        // Player stats with performance index
        if (d.players && d.playerStats) {
            const statsEl = document.getElementById('lv-stats');
            const shootPos = ['GS', 'GA'];
            const defPos = ['GD', 'GK', 'WD'];

            // Build position map from court data or events
            const playerPos = {};
            if (d.court) {
                Object.entries(d.court).forEach(([pos, p]) => { if (p) playerPos[p.id] = pos; });
            }
            if (d.events) {
                d.events.forEach(e => { if (e.playerId !== null && e.position) playerPos[e.playerId] = e.position; });
            }

            // Performance index: 0-100 based on position
            function calcIndex(s, pos) {
                const positives = (s.goal||0)*5 + (s.intercept||0)*4 + (s.deflection||0)*3 +
                    (s.rebound||0)*3 + (s.feed||0)*2 + (s.centre_pass||0)*2 + (s.pickup||0)*2;
                const negatives = (s.turnover||0)*4 + (s.unforced_error||0)*3 + (s.not_received||0)*2 +
                    (s.footwork||0)*2 + (s.offside||0)*2 + (s.penalty_contact||0)*2 +
                    (s.penalty_obstruction||0)*2 + (s.miss||0)*1;
                const raw = positives - negatives;
                // Normalize: expect ~20 raw for good game, cap at 50
                return Math.max(0, Math.min(100, Math.round((raw / 40) * 100)));
            }

            statsEl.innerHTML = d.players.map(p => {
                const s = d.playerStats[p.id] || {};
                const goals = s.goal||0, misses = s.miss||0, attempts = goals+misses;
                const pct = attempts > 0 ? Math.round((goals/attempts)*100)+'%' : '';
                const pos = playerPos[p.id] || '';
                const hasStats = Object.keys(s).length > 0;
                if (!hasStats) return '';

                const idx = calcIndex(s, pos);
                const courtMins = d.courtTime && d.courtTime[p.id] ? Math.round(d.courtTime[p.id]/60) : '';
                const idxColor = idx >= 70 ? 'var(--success)' : idx >= 40 ? 'var(--accent-light)' : 'var(--danger)';

                let statsHtml = '';
                if (attempts > 0) {
                    statsHtml += `<div class="stat-val goals"><span class="num">${goals}</span><span class="label">Goals</span></div>`;
                    statsHtml += `<div class="stat-val shooting"><span class="num">${pct}</span><span class="label">Shot%</span></div>`;
                }
                if (s.intercept) statsHtml += `<div class="stat-val"><span class="num">${s.intercept}</span><span class="label">Int</span></div>`;
                if (s.deflection) statsHtml += `<div class="stat-val"><span class="num">${s.deflection}</span><span class="label">Def</span></div>`;
                if (s.rebound) statsHtml += `<div class="stat-val"><span class="num">${s.rebound}</span><span class="label">Reb</span></div>`;
                if (s.turnover) statsHtml += `<div class="stat-val"><span class="num" style="color:var(--danger)">${s.turnover}</span><span class="label">TO</span></div>`;
                if (s.unforced_error) statsHtml += `<div class="stat-val"><span class="num" style="color:var(--danger)">${s.unforced_error}</span><span class="label">UE</span></div>`;
                if (s.centre_pass) statsHtml += `<div class="stat-val"><span class="num">${s.centre_pass}</span><span class="label">CP</span></div>`;
                if (s.feed) statsHtml += `<div class="stat-val"><span class="num">${s.feed}</span><span class="label">Feed</span></div>`;
                if (s.not_received) statsHtml += `<div class="stat-val"><span class="num" style="color:var(--danger)">${s.not_received}</span><span class="label">NR</span></div>`;

                return `<div class="stat-card">
                    ${pos ? `<span class="stat-pos">${pos}</span>` : ''}
                    <span class="stat-name">${p.name}</span>
                    <span class="stat-index" style="color:${idxColor}">${idx}</span>
                    <div class="stat-values">${statsHtml}</div>
                    ${courtMins ? `<span class="stat-mins">${courtMins}m</span>` : ''}
                </div>`;
            }).join('');
        }

        // Lineup / team sheet
        if (d.court) {
            const posOrder = ['GS', 'GA', 'WA', 'C', 'WD', 'GD', 'GK'];
            const rows = [
                { label: 'Attack', positions: ['GS', 'GA'] },
                { label: 'Centre', positions: ['WA', 'C', 'WD'] },
                { label: 'Defence', positions: ['GD', 'GK'] },
            ];
            const lineupEl = document.getElementById('lv-lineup');
            lineupEl.innerHTML = rows.map(row => {
                const slots = row.positions.map(pos => {
                    const p = d.court[pos];
                    return `<div class="lineup-slot">
                        <div class="lineup-pos">${pos}</div>
                        <div class="lineup-name">${p ? p.name : '—'}</div>
                    </div>`;
                }).join('');
                return `<div class="lineup-section">
                    <div class="lineup-label">${row.label}</div>
                    <div class="lineup-row">${slots}</div>
                </div>`;
            }).join('');

            // Bench players
            const courtIds = new Set(Object.values(d.court).filter(Boolean).map(p => p.id));
            const bench = (d.players || []).filter(p => !courtIds.has(p.id));
            if (bench.length) {
                lineupEl.innerHTML += `<div class="lineup-section">
                    <div class="lineup-label">Bench</div>
                    <div class="lineup-row">${bench.map(p =>
                        `<div class="lineup-slot bench"><div class="lineup-name">${p.name}</div></div>`
                    ).join('')}</div>
                </div>`;
            }
        }

        prevScore = (d.homeScore || 0) + (d.awayScore || 0);
    });

    // Load previous match results
    let allMatches = [];

    async function loadResults() {
        try {
            const snap = await getDocs(collection(db, 'matches'));
            allMatches = snap.docs.map(d => d.data());
            allMatches.sort((a, b) => b.id - a.id);

            const listEl = document.getElementById('results-list');
            const sectionEl = document.getElementById('results-section');

            if (!allMatches.length) {
                sectionEl.style.display = 'none';
                return;
            }

            listEl.innerHTML = allMatches.map((m, idx) => {
                let goals = 0, misses = 0;
                if (m.playerStats) {
                    Object.values(m.playerStats).forEach(s => {
                        goals += s.goal || 0;
                        misses += s.miss || 0;
                    });
                }
                const attempts = goals + misses;
                const pct = attempts > 0 ? Math.round((goals / attempts) * 100) : 0;
                const quarters = (m.quarterScores || [])
                    .map((qs, i) => `Q${i+1}: ${qs.home}-${qs.away}`).join(' | ');

                return `<div class="result-card" onclick="openDetail(${idx})" style="cursor:pointer">
                    <div class="result-top">
                        <span class="result-date">${m.date || ''}${m.venue ? ' — ' + m.venue : ''}</span>
                        ${m.competition ? `<span class="result-comp">${m.competition}</span>` : ''}
                    </div>
                    <div class="result-score">${m.homeScore} - ${m.awayScore}</div>
                    <div class="result-teams">${m.homeTeam} vs ${m.awayTeam}</div>
                    ${quarters ? `<div class="result-quarters">${quarters}</div>` : ''}
                    ${attempts > 0 ? `<div class="result-shooting">Shooting: ${goals}/${attempts} (${pct}%)</div>` : ''}
                </div>`;
            }).join('');
        } catch (e) {
            console.warn('Could not load results:', e);
        }
    }

    // Match detail view
    window.openDetail = function(idx) {
        const m = allMatches[idx];
        if (!m) return;

        // Shooting totals
        let goals = 0, misses = 0;
        if (m.playerStats) {
            Object.values(m.playerStats).forEach(s => { goals += s.goal || 0; misses += s.miss || 0; });
        }
        const attempts = goals + misses;
        const pct = attempts > 0 ? Math.round((goals / attempts) * 100) : 0;

        let html = '';

        // Score hero
        html += `<div class="detail-score-hero">
            <div class="detail-final-label">Full Time</div>
            <div class="detail-final-score">${m.homeScore} - ${m.awayScore}</div>
            <div class="detail-final-teams">${m.homeTeam} vs ${m.awayTeam}</div>
            <div class="detail-meta">${m.date || ''}${m.venue ? ' | ' + m.venue : ''}${m.competition ? ' | ' + m.competition : ''}</div>
        </div>`;

        // Quarter scores
        if (m.quarterScores) {
            html += `<div class="quarter-strip">${m.quarterScores.map((qs, i) =>
                `<div class="qs-card"><div class="qs-label">Q${i+1}</div><div class="qs-score">${qs.home} - ${qs.away}</div></div>`
            ).join('')}</div>`;
        }

        // Team shooting
        html += `<div class="detail-section">
            <div class="detail-section-title">Team Stats</div>
            <div class="stat-card"><span class="stat-name">Shooting</span>
                <div class="stat-values">
                    <div class="stat-val goals"><span class="num">${goals}</span><span class="label">Goals</span></div>
                    <div class="stat-val"><span class="num">${attempts}</span><span class="label">Shots</span></div>
                    <div class="stat-val shooting"><span class="num">${pct}%</span><span class="label">Accuracy</span></div>
                </div>
            </div>
        </div>`;

        // Player stats
        if (m.players && m.playerStats) {
            html += `<div class="detail-section"><div class="detail-section-title">Player Stats</div>`;
            m.players.forEach(p => {
                const s = m.playerStats[p.id] || {};
                if (!Object.keys(s).length) return;
                const pg = s.goal || 0, pm = s.miss || 0, pa = pg + pm;
                const ppct = pa > 0 ? Math.round((pg/pa)*100) + '%' : '';

                let vals = '';
                if (pa > 0) vals += `<div class="stat-val goals"><span class="num">${pg}</span><span class="label">Goals</span></div>`;
                if (ppct) vals += `<div class="stat-val shooting"><span class="num">${ppct}</span><span class="label">Shot%</span></div>`;
                if (s.intercept) vals += `<div class="stat-val"><span class="num">${s.intercept}</span><span class="label">Int</span></div>`;
                if (s.turnover) vals += `<div class="stat-val"><span class="num">${s.turnover}</span><span class="label">TO</span></div>`;
                if (s.rebound) vals += `<div class="stat-val"><span class="num">${s.rebound}</span><span class="label">Reb</span></div>`;
                if (s.centre_pass) vals += `<div class="stat-val"><span class="num">${s.centre_pass}</span><span class="label">CP</span></div>`;
                if (s.feed) vals += `<div class="stat-val"><span class="num">${s.feed}</span><span class="label">Feed</span></div>`;
                if (s.assist) vals += `<div class="stat-val"><span class="num">${s.assist}</span><span class="label">Ast</span></div>`;
                if (s.deflection) vals += `<div class="stat-val"><span class="num">${s.deflection}</span><span class="label">Def</span></div>`;

                html += `<div class="stat-card"><span class="stat-name">${p.name}</span><div class="stat-values">${vals}</div></div>`;
            });
            html += `</div>`;
        }

        // Event timeline
        if (m.events && m.events.length) {
            html += `<div class="detail-section"><div class="detail-section-title">Timeline</div><div class="feed-list">`;
            m.events.forEach(e => {
                const ev = getEventDisplay(e);
                html += `<div class="feed-item ${ev.css}">
                    <span class="feed-time">Q${e.quarter}</span>
                    <span class="feed-icon">${ev.icon}</span>
                    <span class="feed-text">${ev.text}</span>
                    <span class="feed-time">${e.time || ''}</span>
                </div>`;
            });
            html += `</div></div>`;
        }

        document.getElementById('detail-content').innerHTML = html;
        document.getElementById('match-detail').style.display = '';
    };

    window.closeDetail = function() {
        document.getElementById('match-detail').style.display = 'none';
    };

    loadResults();
</script>
</body>
</html>
